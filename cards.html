<!DOCTYPE html>
<html lang="ko">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>그림카드 현황 · 차즘 보물찾기</title>
  <meta name="description" content="차즘(chazm.co.kr) 숨겨진 차키를 찾아라 이벤트 힌트를 한눈에 보는 비공식 큐레이션 페이지" />
  <link rel="preconnect" href="https://static.chazm.co.kr" crossorigin />
  <link rel="preconnect" href="https://cdn.jsdelivr.net" crossorigin />
  <link rel="preload" as="font" type="font/woff2" crossorigin="anonymous"
        href="https://static.chazm.co.kr/chazm-web/5.47.1/_next/static/media/NyjDasanB-s.p.0inf86j4oyk5u.woff2" />
  <link rel="stylesheet" href="styles.css?v=__CACHE_BUST__" />
  <style>
    /* ── Countdown banner ── */
    .pc-banner {
      background: var(--surface);
      border: 1px solid var(--border);
      border-radius: 14px;
      padding: 20px 24px;
      margin-bottom: 20px;
      display: flex;
      flex-direction: column;
      align-items: center;
      gap: 10px;
      text-align: center;
    }
    .pc-banner-label { font-size: 13px; color: var(--text-dim); }
    .pc-banner-timer {
      font-size: 34px;
      font-weight: 700;
      font-variant-numeric: tabular-nums;
      letter-spacing: 0.04em;
      color: var(--text);
    }
    .pc-banner-stats { display: flex; gap: 6px; align-items: center; font-size: 13px; }
    .pc-stat-found { color: var(--confirmed); font-weight: 600; }
    .pc-stat-total { color: var(--text-dim); }

    /* ── View toggle ── */
    .pc-view-toggle {
      display: flex;
      background: var(--surface);
      border: 1px solid var(--border);
      border-radius: 999px;
      padding: 4px;
      width: fit-content;
      margin-bottom: 20px;
    }
    .pc-view-btn {
      background: none;
      border: none;
      color: var(--text-dim);
      font: inherit;
      font-size: 13px;
      padding: 7px 20px;
      border-radius: 999px;
      cursor: pointer;
      transition: background 0.15s, color 0.15s;
    }
    .pc-view-btn:hover { color: var(--text); }
    .pc-view-btn.active { background: var(--text); color: var(--bg); }

    /* ── Card grid ── */
    .pc-grid {
      display: grid;
      grid-template-columns: repeat(auto-fill, minmax(148px, 1fr));
      gap: 12px;
      margin-bottom: 40px;
    }
    .pc-card-slot { aspect-ratio: 3/4; position: relative; }
    .pc-card {
      position: absolute;
      inset: 0;
      border-radius: 14px;
      display: flex;
      flex-direction: column;
      align-items: center;
      justify-content: center;
      padding: 14px;
      gap: 6px;
      text-align: center;
    }

    /* Found */
    .pc-card-found {
      background: linear-gradient(160deg, #19180d 0%, #141414 100%);
      border: 1px solid rgba(201, 180, 122, 0.45);
      box-shadow: 0 0 0 1px rgba(201,180,122,0.12), 0 12px 28px rgba(0,0,0,0.5);
      cursor: pointer;
      transition: transform 0.18s ease, box-shadow 0.18s ease;
    }
    .pc-card-found:hover {
      transform: translateY(-3px);
      box-shadow: 0 0 0 1px rgba(201,180,122,0.35), 0 18px 38px rgba(0,0,0,0.6);
    }
    .pc-badge {
      font-size: 10px;
      font-weight: 600;
      letter-spacing: 0.07em;
      color: var(--accent);
      background: rgba(201,180,122,0.14);
      border: 1px solid rgba(201,180,122,0.3);
      padding: 2px 9px;
      border-radius: 999px;
    }
    /* Revealed (hint-style) */
    .pc-card-revealed {
      background: var(--card-bg);
      color: var(--card-ink);
      border: 1px solid rgba(0,0,0,0.06);
      box-shadow: 0 12px 28px rgba(0,0,0,0.5);
      padding: 0;
      cursor: pointer;
      overflow: hidden;
      gap: 0;
      transition: transform 0.18s ease, box-shadow 0.18s ease;
    }
    .pc-card-revealed:hover {
      transform: translateY(-3px);
      box-shadow: 0 18px 38px rgba(0,0,0,0.6);
    }
    .pc-revealed-header {
      width: 100%;
      padding: 10px 12px 8px;
      font-size: 12px;
      font-weight: 500;
      color: #6e6b65;
      border-bottom: 1px solid rgba(0,0,0,0.06);
      background: rgba(0,0,0,0.02);
      text-align: left;
    }
    .pc-revealed-body {
      flex: 1;
      width: 100%;
      display: flex;
      align-items: center;
      justify-content: center;
      padding: 8px;
      min-height: 0;
    }
    .pc-revealed-body img {
      max-width: 100%;
      max-height: 100%;
      object-fit: contain;
      display: block;
    }
    .pc-card-id { font-size: 11px; color: var(--text-dim); }
    .pc-location { font-size: 20px; font-weight: 700; color: var(--text); letter-spacing: -0.02em; }
    .pc-prize {
      font-size: 11px;
      color: var(--accent);
      background: rgba(201,180,122,0.1);
      border: 1px solid rgba(201,180,122,0.2);
      padding: 2px 8px;
      border-radius: 999px;
      white-space: nowrap;
      overflow: hidden;
      text-overflow: ellipsis;
      max-width: 100%;
    }
    .pc-rank { font-size: 10px; color: var(--confirmed); font-weight: 600; }
    .pc-finder { font-size: 10px; color: var(--text-dim); }

    /* Hidden */
    .pc-card-hidden {
      background: var(--surface);
      border: 1px dashed rgba(255,255,255,0.07);
    }
    .pc-hidden-id { font-size: 11px; color: rgba(255,255,255,0.15); }
    .pc-hidden-q {
      font-family: nyjDasan, "nyjDasan Fallback", sans-serif;
      font-size: 56px;
      line-height: 1;
      color: rgba(255,255,255,0.06);
    }
    .pc-hidden-label { font-size: 10px; color: rgba(255,255,255,0.12); letter-spacing: 0.05em; }

    /* ── Map ── */
    .pc-map-wrap {
      background: var(--surface);
      border: 1px solid var(--border);
      border-radius: 14px;
      padding: 24px;
      margin-bottom: 40px;
      display: flex;
      flex-direction: column;
      align-items: center;
      gap: 20px;
    }
    .pc-map-svg { width: 100%; max-width: 320px; height: auto; display: block; }
    .pc-map-land {
      fill: #1c1c22;
      stroke: #3a3a44;
      stroke-width: 1.5;
      stroke-linejoin: round;
    }
    .pc-map-marker { cursor: pointer; }

    @keyframes pc-pulse {
      0%   { r: 10; opacity: 0.5; }
      100% { r: 24; opacity: 0; }
    }
    .pc-marker-pulse { fill: var(--accent); animation: pc-pulse 2.4s ease-out infinite; }
    .pc-marker-ring  { fill: none; stroke: var(--accent); stroke-width: 1.5; opacity: 0.6; }
    .pc-marker-dot   { fill: var(--accent); }
    .pc-marker-text  {
      fill: var(--text);
      font-size: 9px;
      font-family: "Pretendard Variable", Pretendard, sans-serif;
      font-weight: 700;
      text-anchor: middle;
      pointer-events: none;
    }

    .pc-info-panel {
      width: 100%;
      max-width: 320px;
      background: var(--surface-2);
      border: 1px solid rgba(201,180,122,0.25);
      border-radius: 12px;
      padding: 16px 20px;
    }
    .pc-info-title { font-size: 12px; font-weight: 600; color: var(--accent); margin-bottom: 10px; }
    .pc-info-image {
      width: 100%;
      max-width: 280px;
      aspect-ratio: 1 / 1;
      object-fit: contain;
      background: #f3eee2;
      border-radius: 10px;
      margin: 0 auto 12px;
      display: block;
    }
    .pc-info-row {
      display: flex;
      justify-content: space-between;
      align-items: center;
      font-size: 12px;
      padding: 5px 0;
      border-bottom: 1px solid var(--border);
    }
    .pc-info-row:last-child { border-bottom: none; }
    .pc-info-lbl { color: var(--text-dim); }
    .pc-info-val { color: var(--text); font-weight: 500; }
    .pc-info-val.is-rank { color: var(--confirmed); }
    .pc-map-hint { font-size: 11px; color: var(--text-dim); text-align: center; }
    .pc-island-label {
      fill: #5a5a62;
      font-size: 7px;
      font-family: "Pretendard Variable", Pretendard, sans-serif;
      font-weight: 600;
      text-anchor: middle;
      pointer-events: none;
    }
    .pc-spot {
      font-size: 10px;
      color: var(--accent);
      background: rgba(201,180,122,0.1);
      border: 1px solid rgba(201,180,122,0.2);
      padding: 2px 8px;
      border-radius: 999px;
    }
    .pc-found-time { font-size: 10px; color: var(--text-dim); margin-top: 2px; }

    /* Per-card reveal countdown */
    .pc-card-cd {
      margin-top: 4px;
      font-size: 11px;
      font-variant-numeric: tabular-nums;
      font-weight: 600;
      letter-spacing: 0.03em;
      color: var(--accent);
      background: rgba(201,180,122,0.1);
      border: 1px solid rgba(201,180,122,0.2);
      padding: 3px 8px;
      border-radius: 999px;
      white-space: nowrap;
    }
    .pc-card-cd.revealed {
      color: var(--confirmed);
      background: rgba(111,185,143,0.1);
      border-color: rgba(111,185,143,0.25);
    }

    @media (max-width: 520px) {
      .pc-grid { grid-template-columns: repeat(3, 1fr); gap: 8px; }
      .pc-card { padding: 10px; gap: 4px; }
      .pc-location { font-size: 16px; }
      .pc-hidden-q { font-size: 42px; }
      .pc-banner-timer { font-size: 26px; }
    }
    @media (max-width: 360px) {
      .pc-grid { grid-template-columns: repeat(2, 1fr); }
    }
  </style>
</head>
<body>
  <site-header data-page="cards"></site-header>
  <div x-data="pcApp()" x-init="init()" x-cloak>
    <main class="container">
      <!-- Countdown -->
      <div class="pc-banner">
        <div class="pc-banner-label" x-text="countdownLabel"></div>
        <div class="pc-banner-timer" x-text="countdown || '공개됨'"></div>
        <div class="pc-banner-stats">
          <span class="pc-stat-found">발견 <strong x-text="foundCount"></strong>개</span>
          <span class="pc-stat-total">/ 전체 <strong x-text="cards.length"></strong>개</span>
        </div>
      </div>

      <!-- AI copy -->
      <div class="ai-copy-bar">
        <button
          class="ai-copy-btn"
          :class="{ copied: copyState === 'copied' }"
          @click="copyForAI()"
          type="button"
          x-text="copyState === 'copied' ? '복사됨!' : 'AI용 카드 정보 복사'"
        ></button>
      </div>

      <!-- View toggle -->
      <div class="pc-view-toggle">
        <button type="button" class="pc-view-btn" :class="{ active: view === 'cards' }" @click="view = 'cards'">카드 뷰</button>
        <button type="button" class="pc-view-btn" :class="{ active: view === 'map' }" @click="view = 'map'">지도 뷰</button>
      </div>

      <!-- Card grid -->
      <div class="pc-grid" x-show="view === 'cards'" x-cloak>
        <template x-for="card in cards" :key="card.id">
          <div class="pc-card-slot">
            <template x-if="card.found && cardRevealed(card) && card.image">
              <div class="pc-card pc-card-revealed" @click="view = 'map'; selectedCard = card">
                <div class="pc-revealed-header">
                  <span x-text="card.hintRef || ('발견 #' + card.id)"></span>
                </div>
                <div class="pc-revealed-body">
                  <img :src="card.image" :alt="card.hintRef || ('발견 #' + card.id)" loading="lazy" decoding="async" />
                </div>
              </div>
            </template>
            <template x-if="card.found && !(cardRevealed(card) && card.image)">
              <div class="pc-card pc-card-found" @click="view = 'map'; selectedCard = card">
                <div class="pc-badge">발견됨</div>
                <div class="pc-card-id" x-text="'발견 #' + card.id"></div>
                <div class="pc-location" x-text="card.location"></div>
                <div class="pc-prize" x-text="card.prize"></div>
                <div class="pc-finder" x-text="card.finder"></div>
                <div class="pc-found-time" x-text="foundTime(card)"></div>
                <div
                  class="pc-card-cd"
                  :class="{ revealed: cardRevealed(card) }"
                  x-text="cardCountdown(card)"
                ></div>
              </div>
            </template>
            <template x-if="!card.found">
              <div class="pc-card pc-card-hidden">
                <div class="pc-hidden-id" x-text="'발견 #' + card.id"></div>
                <div class="pc-hidden-q">?</div>
                <div class="pc-hidden-label">미발견</div>
              </div>
            </template>
          </div>
        </template>
      </div>

      <!-- Map view -->
      <div class="pc-map-wrap" x-show="view === 'map'" x-cloak>
        <svg viewBox="0 0 370 450" class="pc-map-svg" xmlns="http://www.w3.org/2000/svg">

            M 36,54

            L 243,74
            L 264,116
            L 279,209
            Q 270,248 250,279
            L 229,294
            Q 193,303 157,306
            Q 118,321 86,337
            L 79,321
            Q 64,308 64,302
            L 71,276
            Q 80,244 86,213
            Q 72,190 64,170
            Q 76,153 82,139
            Q 87,116 86,97
            L 82,85
            Z
          " />
          <!-- 제주도 -->
          <ellipse cx="71" cy="408" rx="26" ry="13" class="pc-map-land" />
          <text x="71" y="431" class="pc-island-label">제주도</text>

          <!-- 울릉도 -->
          <circle cx="316" cy="95" r="7" class="pc-map-land" />
          <text x="316" y="87" class="pc-island-label">울릉도</text>

          <!-- 독도 -->
          <circle cx="350" cy="115" r="4" class="pc-map-land" />
          <text x="350" y="107" class="pc-island-label">독도</text>

          <!-- Card #1 marker: 충주시 (174, 132) -->
          <g x-show="cards[0].found" class="pc-map-marker" @click="selectedCard = cards[0]">
            <circle cx="174" cy="132" r="12" class="pc-marker-pulse" />
            <circle cx="174" cy="132" r="9"  class="pc-marker-ring" />
            <circle cx="174" cy="132" r="5"  class="pc-marker-dot" />
            <text   x="174"  y="116"         class="pc-marker-text" x-text="cards[0].location"></text>
          </g>

            <circle cx="106" cy="91" r="9"  class="pc-marker-ring" />
            <circle cx="106" cy="91" r="5"  class="pc-marker-dot" />
            <text   x="106"  y="75"         class="pc-marker-text" x-text="cards[1].location"></text>
          </g>
          <!-- Card #3 marker: 강원 강릉시 (241, 74) -->
          <g x-show="cards[2].found" class="pc-map-marker" @click="selectedCard = cards[2]">
            <circle cx="241" cy="74" r="12" class="pc-marker-pulse" />
            <circle cx="241" cy="74" r="9"  class="pc-marker-ring" />
            <circle cx="241" cy="74" r="5"  class="pc-marker-dot" />
            <text   x="241"  y="58"         class="pc-marker-text" x-text="cards[2].location"></text>
          </g>
          <!-- Card #4 marker: 대구 중구 (221, 219) -->

            <circle cx="253" cy="279" r="9"  class="pc-marker-ring" />

            <circle cx="120" cy="113" r="9"  class="pc-marker-ring" />
            <circle cx="120" cy="113" r="5"  class="pc-marker-dot" />
            <text   x="120"  y="97"          class="pc-marker-text" x-text="cards[5].location"></text>
          </g>

          <g x-show="cards[7].found" class="pc-map-marker" @click="selectedCard = cards[7]">
            <circle cx="71" cy="408" r="12" class="pc-marker-pulse" />
            <circle cx="71" cy="408" r="9"  class="pc-marker-ring" />
            <circle cx="71" cy="408" r="5"  class="pc-marker-dot" />
            <text   x="71"  y="392"         class="pc-marker-text" x-text="cards[7].location"></text>
          </g>
        </svg>

        <!-- Info panel -->
        <template x-if="selectedCard && selectedCard.found">
          <div class="pc-info-panel">
            <div class="pc-info-title" x-text="(selectedCard.hintRef ? selectedCard.hintRef + ' · ' : '') + '발견 #' + selectedCard.id"></div>
            <img
              x-show="selectedCard.image && cardRevealed(selectedCard)"
              :src="selectedCard.image"
              :alt="selectedCard.hintRef || ('발견 #' + selectedCard.id)"
              class="pc-info-image"
            />

              <span class="pc-info-lbl">발견 장소</span>

        get foundCount() {
          return this.cards.filter(c => c.found).length;
        },

        init() {
          this.selectedCard = this.cards.find(c => c.found) || null;
          this.startCountdown();
        },

        copyForAI() {
          const found = this.cards.filter(c => c.found);
          const lines = [
            `[차즘 그림카드 현황] 발견 ${found.length}개 / 전체 ${this.cards.length}개\n`,
          ];
          for (const c of found) {
            const parts = [`발견 #${c.id}`];
            if (c.hintRef) parts.push(c.hintRef);
            parts.push(c.location);
            if (c.spot) parts.push(c.spot);
            parts.push(c.prize, c.finder, this.foundTime(c));
            lines.push(parts.join(' · '));
          }
          const unfound = this.cards.filter(c => !c.found).map(c => `발견 #${c.id}`).join(', ');
          if (unfound) lines.push(`\n미발견: ${unfound}`);
          lines.push('\n출처: https://chazm.co.kr/treasure');

          const text = lines.join('\n');
          const finish = () => {
            this.copyState = 'copied';
            setTimeout(() => { this.copyState = 'idle'; }, 2000);
          };
          if (navigator.clipboard) {
            navigator.clipboard.writeText(text).then(finish).catch(() => { this._fallbackCopy(text); finish(); });
          } else {
            this._fallbackCopy(text); finish();
          }
        },

        _fallbackCopy(text) {
          const ta = document.createElement('textarea');
          ta.value = text;
          ta.style.cssText = 'position:fixed;top:0;left:0;opacity:0;pointer-events:none';
          document.body.appendChild(ta);
          ta.select();
          try { document.execCommand('copy'); } catch (_) {}
          document.body.removeChild(ta);
        },

        foundTime(card) {
          if (!card.foundAt) return '';
          const d = new Date(card.foundAt);
          const kst = new Date(d.getTime() + 9 * 3600000);
          const M = kst.getUTCMonth() + 1;
          const D = kst.getUTCDate();
          const h = String(kst.getUTCHours()).padStart(2, '0');
          const m = String(kst.getUTCMinutes()).padStart(2, '0');
          return `${M}월 ${D}일 ${h}:${m} 발견`;
        },

        cardRevealed(card) {
          void this._tick;
          return card.revealAt && Date.now() >= new Date(card.revealAt).getTime();
        },

        cardCountdown(card) {
          void this._tick;
          if (!card.revealAt) return '';
          const diff = new Date(card.revealAt).getTime() - Date.now();
          if (diff <= 0) return '그림카드 공개됨';
          const h   = Math.floor(diff / 3600000);
          const m   = Math.floor((diff % 3600000) / 60000);
          const s   = Math.floor((diff % 60000)   / 1000);
          const pad = n => String(n).padStart(2, '0');
          return `공개까지 ${pad(h)}:${pad(m)}:${pad(s)}`;
        },

        startCountdown() {
          const TARGET = Date.UTC(2026, 4, 7, 15, 0, 0); // 2026-05-08 00:00 KST
          const tick = () => {
            this._tick++;
            const diff = TARGET - Date.now();
            if (diff <= 0) {
              this.countdown = null;
              this.countdownLabel = '그림카드 일괄 공개됨';
              return;
            }
            const days = Math.floor(diff / 86400000);
            const h    = Math.floor((diff % 86400000) / 3600000);
            const m    = Math.floor((diff % 3600000)  / 60000);
            const s    = Math.floor((diff % 60000)    / 1000);
            const pad  = n => String(n).padStart(2, '0');
            this.countdown = days > 0
              ? `${days}일 ${pad(h)}:${pad(m)}:${pad(s)}`
              : `${pad(h)}:${pad(m)}:${pad(s)}`;
          };
          tick();
          setInterval(tick, 1000);
        },
      };
    }
