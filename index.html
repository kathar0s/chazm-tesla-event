<!DOCTYPE html>
<html lang="ko">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>차즘 보물찾기 힌트 모음 · 숨겨진 차키를 찾아라</title>
  <meta name="description" content="차즘(chazm.co.kr) 숨겨진 차키를 찾아라 이벤트 힌트를 한눈에 보는 비공식 큐레이션 페이지" />
  <meta property="og:title" content="차즘 보물찾기 힌트 모음" />
  <meta property="og:description" content="숨겨진 차키를 찾아라 힌트 카드 뷰" />
  <meta property="og:type" content="website" />
  <link rel="preconnect" href="https://static.chazm.co.kr" crossorigin />
  <link rel="preconnect" href="https://cdn.jsdelivr.net" crossorigin />
  <link rel="stylesheet" href="styles.css" />
</head>
<body>
  <div x-data="hintApp()" x-init="init()" x-cloak>
    <header class="site-header">
      <div class="container">
        <h1>차즘 보물찾기 힌트 모음</h1>
        <p>&quot;숨겨진 차키를 찾아라&quot; 힌트를 한눈에 · 비공식 큐레이션</p>
        <div class="meta">
          2026.04.24 ~ 04.29 ·
          <a :href="data.event?.official_url || '#'" target="_blank" rel="noopener">공식 이벤트 페이지 ↗</a>
        </div>
        <nav>
          <a href="index.html">힌트</a>
          <a href="about.html">About</a>
        </nav>
      </div>
    </header>

    <main class="container">
      <div class="grid">
        <template x-for="hint in sortedHints" :key="hintKey(hint)">
          <div class="card" @click="openHint(hint)">
            <div class="card-header">
              <span class="num" x-text="hintLabel(hint)"></span>
            </div>
            <div class="card-body">
              <div class="card-keyword" :class="keywordSizeClass(hint.keyword)" x-text="hint.keyword"></div>
            </div>
          </div>
        </template>
      </div>

      <template x-if="selectedHint">
        <div class="modal-backdrop" @click.self="closeHint()" @keydown.escape.window="closeHint()">
          <div class="modal" role="dialog" aria-modal="true">
            <div class="modal-card">
              <div class="modal-card-header">
                <span x-text="hintLabel(selectedHint)"></span>
                <button class="modal-close" @click="closeHint()" aria-label="닫기">×</button>
              </div>
              <div class="modal-card-body">
                <div class="modal-keyword" :class="{ long: [...selectedHint.keyword].length > 3 }" x-text="selectedHint.keyword"></div>
              </div>
            </div>
            <template x-if="selectedHint.notes || selectedHint.location || groupName(selectedHint.group_id)">
              <div class="modal-meta-panel">
                <template x-if="selectedHint.location">
                  <div class="row">
                    <div class="label">추정 위치</div>
                    <div class="value" x-text="selectedHint.location"></div>
                  </div>
                </template>
                <template x-if="groupName(selectedHint.group_id)">
                  <div class="row">
                    <div class="label">그룹</div>
                    <div class="value" x-text="groupName(selectedHint.group_id)"></div>
                  </div>
                </template>
                <template x-if="selectedHint.notes">
                  <div class="row">
                    <div class="label">메모</div>
                    <div class="value" x-text="selectedHint.notes"></div>
                  </div>
                </template>
              </div>
            </template>
          </div>
        </div>
      </template>
    </main>

    <footer class="site-footer">
      <div class="container">
        <div>Made with ☕ · 비공식 팬 큐레이션 · <a href="about.html">About</a></div>
        <div style="margin-top:6px" x-text="`마지막 업데이트: ${formatDate(data.updated_at) || '-'}`"></div>
      </div>
    </footer>
  </div>

  <style>[x-cloak] { display: none !important; }</style>
  <script defer src="https://cdn.jsdelivr.net/npm/alpinejs@3.14.1/dist/cdn.min.js"></script>
  <script src="app.js"></script>
</body>
</html>
