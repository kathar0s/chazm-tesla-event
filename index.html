<!DOCTYPE html>
<html lang="ko">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>차즘 보물찾기 힌트 모음 · 숨겨진 차키를 찾아라</title>
  <meta name="description" content="차즘(chazm.co.kr) 숨겨진 차키를 찾아라 이벤트 힌트를 한눈에 보는 비공식 큐레이션 페이지" />
  <meta property="og:title" content="차즘 보물찾기 힌트 모음" />
  <meta property="og:description" content="숨겨진 차키를 찾아라 힌트 카드 뷰" />
  <meta property="og:type" content="website" />
  <meta name="build-time" content="__BUILD_TIME__" />
  <link rel="preconnect" href="https://static.chazm.co.kr" crossorigin />
  <link rel="preconnect" href="https://cdn.jsdelivr.net" crossorigin />
  <link rel="preconnect" href="https://cdn.chazm.co.kr" crossorigin />
  <link rel="preload" as="font" type="font/woff2" crossorigin="anonymous"
        href="https://static.chazm.co.kr/chazm-web/5.47.1/_next/static/media/NyjDasanB-s.p.0inf86j4oyk5u.woff2" />
  <link rel="stylesheet" href="styles.css?v=__CACHE_BUST__" />
</head>
<body>
  <site-header data-page="hints"></site-header>
  <div x-data="hintApp()" x-init="init()" x-cloak>
    <main class="container">
      <div class="event-dashboard" x-cloak>
        <div class="event-days">
          <template x-for="n in [1,2,3,4,5,6]" :key="n">
            <div class="event-day event-day-clickable" :class="'status-' + dayStatus(n)" @click="setDayCategory(n)" role="button" tabindex="0" @keydown.enter="setDayCategory(n)">
              <div class="event-day-dot"></div>
              <div class="event-day-label" x-text="n + '일차'"></div>
              <div class="event-day-date" x-text="'4/' + (23 + n)"></div>
            </div>
          </template>
          <a class="event-day event-day-card event-day-clickable" :class="'status-' + cardRevealStatus()" href="/cards">
            <div class="event-day-dot event-day-dot-card"></div>
            <div class="event-day-label">카드 공개</div>
            <div class="event-day-date">5/8</div>
          </a>
        </div>
        <div class="event-countdown" x-show="countdown">
          <span class="event-countdown-label" x-text="countdownLabel"></span>
          <span class="event-countdown-timer" x-text="countdown"></span>
        </div>
      </div>

      <div class="category-tabs" role="tablist">
        <template x-for="cat in categories" :key="cat.id">
          <button
            class="cat-tab"
            :class="{ ['cat-tab-' + cat.id]: true, active: activeCategory === cat.id }"
            @click="activeCategory = cat.id"
            :aria-selected="activeCategory === cat.id"
            role="tab"
            type="button"
          >
            <span x-text="cat.label"></span>
            <span class="cat-tab-count" x-text="`(${categoryCounts[cat.id] || 0})`"></span>
          </button>
        </template>
      </div>

      <div class="swipe-hint-banner" x-show="showSwipeHint && categoryHints.some(h => h.keywords.length > 1)" x-cloak>
        <span>겹쳐진 카드는 좌우로 <strong>스와이프</strong> 해서 넘겨보세요</span>
        <button class="swipe-hint-close" @click="dismissSwipeHint()" aria-label="안내 닫기" type="button">×</button>
      </div>

      <div class="search-bar">
        <input
          type="search"
          x-model.debounce.300ms="query"
          placeholder="키워드로 검색 (예 · 비밀번호)"
          aria-label="힌트 키워드 검색"
          autocomplete="off"
          spellcheck="false"
        />
        <button
          class="search-clear"
          x-show="query"
          @click="query = ''"
          aria-label="검색어 지우기"
          type="button"
        >×</button>
      </div>

      <div class="ai-copy-bar" x-show="filteredHints.length > 0" x-cloak>
        <button
          class="ai-copy-btn"
          :class="{ copied: copyState === 'copied' }"
          @click="copyForAI()"
          type="button"
          x-text="copyState === 'copied' ? '복사됨!' : 'AI용 힌트 복사'"
        ></button>
      </div>

      <div class="empty-state" x-show="!query && categoryHints.length === 0" x-cloak>
        <p class="empty-title">아직 공개되지 않은 힌트예요</p>
        <p class="empty-sub">매일 18:00에 새 힌트가 공개됩니다</p>
      </div>

      <div class="empty-state" x-show="query && filteredHints.length === 0">
        <p class="empty-title">
          &quot;<span x-text="query"></span>&quot; 관련 힌트를 찾지 못했습니다.
        </p>
        <p class="empty-sub">
          공식 채팅방에 공개된 새 힌트인가요? GitHub에 제보해 주시면 반영됩니다.
        </p>
        <a
          class="empty-cta"
          :href="reportUrlWithQuery"
          target="_blank"
          rel="noopener"
        >
          GitHub 이슈로 제보하기 ↗
        </a>
      </div>

      <div class="grid" x-show="filteredHints.length > 0">
        <template x-for="hint in filteredHints" :key="hintKey(hint)">
          <div
            class="card-slot"
            :class="{ ['cat-' + hint.category]: true, 'has-stack': hint.keywords.length > 1, 'hint-wiggle': showSwipeHint && hint.keywords.length > 1 }"
            @click="onCardClick($event, hint)"
            @pointerdown="onPointerDown($event, hint)"
            @pointermove="onPointerMove($event, hint)"
            @pointerup="onPointerUp($event, hint)"
            @pointercancel="onPointerCancel($event, hint)"
          >
            <template x-if="hint.image">
              <div class="card" data-pos="0" :style="cardStyle(hint, 0)">
                <div class="card-header">
                  <span class="num" x-text="hintLabel(hint)"></span>
                </div>
                <div class="card-body card-body-image">
                  <img class="card-image" :src="hint.image" :alt="hintLabel(hint)" loading="lazy" decoding="async" />
                </div>
              </div>
            </template>
            <template x-if="!hint.image && hint.keywords && hint.keywords.length > 0">
              <template x-for="(kw, posIdx) in orderedKeywords(hint)" :key="posIdx">
                <div
                  class="card"
                  :data-pos="String(posIdx)"
                  :style="cardStyle(hint, posIdx)"
                >
                  <div class="card-header">
                    <span class="num" x-text="hintLabel(hint)"></span>
                    <template x-if="hint.keywords.length > 1 && posIdx === 0">
                      <span class="card-count" x-text="`${getIndex(hint) + 1} / ${hint.keywords.length}`"></span>
                    </template>
                  </div>
                  <div class="card-body">
                    <div class="card-keyword" :class="keywordSizeClass(kw)" x-text="kw"></div>
                    <template x-if="isImagePending(hint) && posIdx === 0">
                      <div class="card-pending-tag">이미지 제보 중</div>
                    </template>
                  </div>
                </div>
              </template>
            </template>
            <template x-if="isPlaceholder(hint)">
              <div class="card" data-pos="0" :style="cardStyle(hint, 0)">
                <div class="card-header">
                  <span class="num" x-text="hintLabel(hint)"></span>
                </div>
                <div class="card-body card-body-placeholder">
                  <div class="placeholder-icon" aria-hidden="true">?</div>
                  <div class="placeholder-msg">제보 모집 중</div>
                </div>
              </div>
            </template>
          </div>
        </template>
      </div>

      <template x-if="selectedHint">
        <div
          class="modal-backdrop"
          @click.self="closeHint()"
          @keydown.escape.window="closeHint()"
          @keydown.left.window="prevHint()"
          @keydown.right.window="nextHint()"
        >
          <button
            class="modal-nav modal-nav-prev"
            x-show="navList().length > 1"
            @click.stop="prevHint()"
            aria-label="이전 힌트"
            type="button"
          >‹</button>
          <button
            class="modal-nav modal-nav-next"
            x-show="navList().length > 1"
            @click.stop="nextHint()"
            aria-label="다음 힌트"
            type="button"
          >›</button>
          <div class="modal" role="dialog" aria-modal="true">
            <template x-if="selectedHint.image">
              <div class="modal-card" :class="'cat-' + selectedHint.category" :style="{ viewTransitionName: 'hint-' + selectedHint.category + '-' + selectedHint.number + '-p0' }">
                <div class="modal-card-header">
                  <span x-text="hintLabel(selectedHint)"></span>
                  <button class="modal-close" @click="closeHint()" aria-label="닫기">×</button>
                </div>
                <div class="modal-card-body modal-card-body-image">
                  <img class="modal-image" :src="selectedHint.image" :alt="hintLabel(selectedHint)" />
                </div>
              </div>
            </template>
            <template x-if="isPlaceholder(selectedHint)">
              <div class="modal-card" :class="'cat-' + selectedHint.category" :style="{ viewTransitionName: 'hint-' + selectedHint.category + '-' + selectedHint.number + '-p0' }">
                <div class="modal-card-header">
                  <span x-text="hintLabel(selectedHint)"></span>
                  <button class="modal-close" @click="closeHint()" aria-label="닫기">×</button>
                </div>
                <div class="modal-card-body modal-card-body-placeholder">
                  <div class="placeholder-modal-icon" aria-hidden="true">?</div>
                  <p class="placeholder-modal-msg">아직 이미지를 모집 중이에요.<br/>가지고 계신 분이 계시면 도와주세요!</p>
                  <a class="placeholder-cta" :href="kakaoChatUrl" target="_blank" rel="noopener">
                    이미지 제보 중 · 오픈카톡 ↗
                  </a>
                </div>
              </div>
            </template>
            <template x-if="!selectedHint.image && !isPlaceholder(selectedHint)">
              <template x-for="(kw, idx) in orderedKeywords(selectedHint)" :key="idx">
                <div class="modal-card" :class="'cat-' + selectedHint.category" :style="{ viewTransitionName: 'hint-' + selectedHint.category + '-' + selectedHint.number + '-p' + idx }">
                  <div class="modal-card-header">
                    <span x-text="modalCardLabel(selectedHint, idx)"></span>
                    <template x-if="idx === 0">
                      <button class="modal-close" @click="closeHint()" aria-label="닫기">×</button>
                    </template>
                  </div>
                  <div class="modal-card-body">
                    <div class="modal-keyword" :class="{ long: [...kw].length > 3 }" x-text="kw"></div>
                    <template x-if="isImagePending(selectedHint) && idx === 0">
                      <a class="modal-pending-cta" :href="kakaoChatUrl" target="_blank" rel="noopener">
                        이미지 제보 중 · 오픈카톡 ↗
                      </a>
                    </template>
                  </div>
                </div>
              </template>
            </template>
            <template x-if="selectedHint.notes || selectedHint.location || groupName(selectedHint.group_id)">
              <div class="modal-meta-panel">
                <template x-if="selectedHint.location">
                  <div class="row">
                    <div class="label">추정 위치</div>
                    <div class="value" x-text="selectedHint.location"></div>
                  </div>
                </template>
                <template x-if="groupName(selectedHint.group_id)">
                  <div class="row">
                    <div class="label">그룹</div>
                    <div class="value" x-text="groupName(selectedHint.group_id)"></div>
                  </div>
                </template>
                <template x-if="selectedHint.notes">
                  <div class="row">
                    <div class="label">메모</div>
                    <div class="value" x-text="selectedHint.notes"></div>
                  </div>
                </template>
              </div>
            </template>
          </div>
        </div>
      </template>
    </main>

    <footer class="site-footer">
      <div class="container">
        <div>
          Made with ☕ · 비공식 팬 큐레이션 ·
          <a href="/about">About</a> ·
          <a href="https://github.com/kathar0s/chazm-tesla-event" target="_blank" rel="noopener">GitHub</a>
        </div>
        <div style="margin-top:6px" x-text="`마지막 업데이트: ${formatDate(buildTime) || '-'}`"></div>
      </div>
    </footer>
  </div>

  <style>[x-cloak] { display: none !important; }</style>
  <script src="components.js?v=__CACHE_BUST__"></script>
  <script defer src="https://cdn.jsdelivr.net/npm/alpinejs@3.14.1/dist/cdn.min.js"></script>
  <script src="app.js?v=__CACHE_BUST__"></script>
  <!-- Cloudflare Web Analytics -->
  <script defer src="https://static.cloudflareinsights.com/beacon.min.js" data-cf-beacon='{"token": "9853ced3fc91404fa07cecadd75d1ae2"}'></script>
</body>
</html>
